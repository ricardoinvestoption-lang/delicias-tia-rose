<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delícias da Tia Rose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="banner-aviso" style="display: none;">
        <span>🌸</span>
        <span id="texto-aviso">Carregando novidades...</span>
        <button id="fechar-aviso" onclick="document.getElementById('banner-aviso').style.display='none'">✕</button>
    </div>

    <div id="btn-flutuante-carrinho" onclick="abrirCarrinho()">
        <span id="contador-carrinho">0</span>
        🛒 Ver Carrinho
    </div>

    <div id="modal-carrinho" class="modal-overlay">
        <div class="modal-carrinho-content">
            <button class="btn-voltar-carrinho" onclick="fecharCarrinho()">← Voltar</button>
            <h3 style="margin-bottom: 20px; font-family: 'Playfair Display', serif;">🛍️ Seu Carrinho</h3>
            
            <div id="itens-carrinho-lista"></div>

            <div class="carrinho-footer">
                <div class="carrinho-total">
                    <span>Total:</span>
                    <span id="carrinho-valor-total">R$ 0,00</span>
                </div>
                <input type="text" id="nome-cliente-carrinho" placeholder="Seu nome completo..." />
                <button id="btn-finalizar-whatsapp" onclick="enviarCarrinhoWhatsApp()">
                    Finalizar Pedido no WhatsApp ✅
                </button>
            </div>
        </div>
    </div>

    <header>
        <h1 id="titulo-principal">Delícias da Tia Rose</h1>
        <p>Doces feitos com amor</p>
    </header>

    <section class="categorias-container">
        <h2 class="titulo-sessao">Conheça todos os nossos sabores</h2>
        <div class="carrossel-wrapper">
            <button class="seta seta-esq" onclick="scrollMenu(-1)">&#10094;</button>
            <button class="seta seta-dir" onclick="scrollMenu(1)">&#10095;</button>

            <div class="carrossel-scroll" id="menuCarrossel">
                <div class="card-categoria" style="background-image: url('https://i.postimg.cc/5yQfxHKk/semanatem.jpg');">
                    <div class="info-card">
                        <h3 class="texto-destaque">Promoções</h3>
                        <button class="btn-filtro" data-target="secao-promocoes">Ver Opções</button>
                    </div>
                </div>
                <div class="card-categoria" style="background-image: url('https://i.postimg.cc/7hfbrXLG/gelatinacolo.jpg');">
                    <div class="info-card">
                        <h3 class="texto-destaque">Doces</h3>
                        <button class="btn-filtro" data-target="secao-doces">Saiba Mais</button>
                    </div>
                </div>
                <div class="card-categoria" style="background-image: url('https://i.postimg.cc/hvZm065h/balas.png');">
                    <div class="info-card">
                        <h3 class="texto-destaque">Balas de Coco</h3>
                        <button class="btn-filtro" data-target="secao-balas">Saiba Mais</button>
                    </div>
                </div>
                <div class="card-categoria" style="background-image: url('https://i.postimg.cc/VvhStMJq/Ovos.png');">
                    <div class="info-card">
                        <h3 class="texto-destaque">Páscoa</h3>
                        <button class="btn-filtro" data-target="secao-ovos">Saiba Mais</button>
                    </div>
                </div>
                <div class="card-categoria" style="background-image: url('https://i.postimg.cc/HxSjNFTT/bolocapa.jpg');">
                    <div class="info-card">
                        <h3 class="texto-destaque">Bolos</h3>
                        <button class="btn-filtro" data-target="secao-bolos">Saiba Mais</button>
                    </div>
                </div>
                <div class="card-categoria" style="background-image: url('https://i.postimg.cc/GhZ8hF0F/salgados.jpg');">
                    <div class="info-card">
                        <h3 class="texto-destaque">Salgados</h3>
                        <button class="btn-filtro" data-target="secao-salgados">Saiba Mais</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="container">
        <div id="secao-promocoes" class="categoria-vitrine"><h3 class="titulo-categoria">🔥 Promoções</h3><div id="listaPromocoes" class="grid"></div></div>
        <div id="secao-doces" class="categoria-vitrine"><h3 class="titulo-categoria">🍬 Doces</h3><div id="listaDoces" class="grid"></div></div>
        <div id="secao-balas" class="categoria-vitrine"><h3 class="titulo-categoria">🥥 Balas de Coco</h3><div id="listaBalas" class="grid"></div></div>
        <div id="secao-ovos" class="categoria-vitrine"><h3 class="titulo-categoria">🍫 Ovos de Páscoa</h3><div id="listaOvos" class="grid"></div></div>
        <div id="secao-bolos" class="categoria-vitrine"><h3 class="titulo-categoria">🍰 Bolos</h3><div id="listaBolos" class="grid"></div></div>
        <div id="secao-salgados" class="categoria-vitrine"><h3 class="titulo-categoria">🥐 Salgados</h3><div id="listaSalgados" class="grid"></div></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, query, orderBy, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDz8gIhzGwn4oxTqVbg00ooaaGwneON0FA",
            authDomain: "vitrine-delicias-da-tia-rose.firebaseapp.com",
            projectId: "vitrine-delicias-da-tia-rose",
            storageBucket: "vitrine-delicias-da-tia-rose.firebasestorage.app",
            messagingSenderId: "674285117663",
            appId: "1:674285117663:web:d67f6308e4c1e82ea5096a"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.dbMetodos = { collection, addDoc, onSnapshot, doc, query, orderBy, getDoc, serverTimestamp };
    </script>
    <script src="script.js"></script>
</body>
</html>
